---
layout: default
title: EyeCue Video Gallery
---

<div>
  <h1>EyeCue Gallery</h1>
  <p style="font-size: 1.1rem; color: var(--text-muted); max-width: 800px;">
    {{ site.description }}
  </p>
</div>

{% for category in site.data.gallery %}
  <section style="margin-top: 3rem;">
    <h2>{{ category.system_type }}</h2>
    
    <div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 2rem; margin-top: 1.5rem;">
      {% for video in category.videos %}
        <div style="background: white; border-radius: 10px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.05); border: 1px solid var(--border-color); display: flex; flex-direction: column;">
          <!-- 16:9 Aspect Ratio Container for YouTube -->
          <div style="position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; background: #e0e0e0;">
            <iframe src="https://www.youtube.com/embed/{{ video.youtube_id }}" 
                    style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0;" 
                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                    allowfullscreen></iframe>
          </div>
          <div style="padding: 1.5rem; flex-grow: 1; display:flex; flex-direction:column;">
            <h3 style="margin: 0 0 0.5rem 0; font-size: 1.25rem; color: var(--text-color);">{{ video.title }}</h3>
            <p style="font-size: 0.95rem; color: var(--text-muted); margin: 0; line-height: 1.5;">{{ video.description }}</p>
          </div>
        </div>
      {% endfor %}
    </div>
  </section>
{% endfor %}
