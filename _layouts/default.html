<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title | default: site.title }}</title>
  <link rel="icon" type="image/svg+xml" href="{{ site.favicon }}">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  <style>
    /* Layout specific tweaks */
    main {
      min-height: calc(100vh - 200px);
    }
  </style>
</head>

<body>
  {% include header.html %}

  <div class="main-wrapper">
    <main>
      {{ content }}
    </main>

    {% if page.toc %}
    <aside class="toc-sidebar">
      <div class="toc-sticky">
        <h4>On this page</h4>
        <ul id="toc"></ul>
      </div>
    </aside>
    {% endif %}
  </div>

  {% include footer.html %}

  {% if page.toc %}
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const container = document.querySelector('.content-box');
      const toc = document.getElementById('toc');
      if (!container || !toc) return;

      const headings = container.querySelectorAll('h1, h2, h3');
      headings.forEach((heading, index) => {
        if (!heading.id) {
          heading.id = heading.textContent.toLowerCase()
            .trim()
            .replace(/[^\w\s-]/g, '')
            .replace(/[\s_-]+/g, '-')
            .replace(/^-+|-+$/g, '');
          
          if (document.getElementById(heading.id) && document.getElementById(heading.id) !== heading) {
            heading.id += '-' + index;
          }
        }

        const a = document.createElement('a');
        a.href = '#' + heading.id;
        a.textContent = heading.textContent;
        
        // Add level classes for indentation
        if (heading.tagName === 'H2') a.classList.add('toc-h2');
        if (heading.tagName === 'H3') a.classList.add('toc-h3');

        const li = document.createElement('li');
        li.appendChild(a);
        toc.appendChild(li);
      });

      // Intersection Observer for active state
      const observer = new IntersectionObserver((entries) => {
        // Find the top-most intersecting header
        const intersecting = entries.filter(e => e.isIntersecting);
        if (intersecting.length > 0) {
          // Sort by visibility ratio if needed, or just pick the first one from top
          const activeId = intersecting[0].target.id;
          const navLink = toc.querySelector(`a[href="#${activeId}"]`);
          if (navLink) {
            toc.querySelectorAll('a').forEach(link => link.classList.remove('active'));
            navLink.classList.add('active');
          }
        }
      }, { rootMargin: '-10% 0px -70% 0px' });

      headings.forEach(h => observer.observe(h));
    });
  </script>
  {% endif %}
</body>

</html>
